name: flutter_clean_with_provider
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.12.2


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State management
  provider: ^6.1.2

  # Networking
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # Connectivity checking (used before every API call)
  internet_connection_checker: ^1.0.0+1

  # Navigation
  go_router: ^14.2.0

  # Responsive UI sizing
  flutter_screenutil: ^5.9.3

  # Toast messages
  fluttertoast: ^8.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:

  uses-material-design: true
